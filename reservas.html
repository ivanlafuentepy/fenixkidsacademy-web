<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reservas | Fenix Kids Academy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --blue: #1e4db7;
      --blue-dark: #163a8a;
      --orange: #f5a623;
      --green: #2d7a3a;
      --cream: #fdf6e3;
      --text: #1a1a1a;
      --card-bg: #fff;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }
    .header {
      background: linear-gradient(160deg, #1a3a80, #0f2a6e);
      padding: 24px 20px;
      text-align: center;
    }
    .header img { height: 48px; margin-bottom: 8px; }
    .header h1 { color: #fff; font-size: 1.4rem; font-weight: 600; }
    .header .fecha { color: var(--orange); font-size: 1.1rem; margin-top: 4px; font-weight: 600; }
    .nav { text-align: center; padding: 12px; background: #fff; border-bottom: 1px solid #e0d8c8; }
    .nav a { color: var(--blue); text-decoration: none; margin: 0 12px; font-size: 0.85rem; font-weight: 500; }
    .nav a:hover { text-decoration: underline; }
    .container { max-width: 800px; margin: 0 auto; padding: 20px 16px; }
    .turno { margin-bottom: 28px; }
    .turno-header {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px; background: var(--blue); color: #fff;
      border-radius: 10px 10px 0 0; font-weight: 600;
    }
    .turno-header .hora { font-size: 1.2rem; }
    .turno-header .count { opacity: 0.8; font-size: 0.85rem; }
    .turno-body { background: var(--card-bg); border-radius: 0 0 10px 10px; box-shadow: var(--shadow); }
    .grupo-label { padding: 8px 16px; font-size: 0.75rem; font-weight: 600; color: #888; text-transform: uppercase; border-bottom: 1px solid #f0ebe0; }
    .nino-row {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 16px; border-bottom: 1px solid #f5f0e8;
      text-decoration: none; color: inherit; transition: background 0.15s;
    }
    .nino-row:hover { background: #fdf8ee; }
    .nino-row:last-child { border-bottom: none; }
    .nino-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: #e8e0d4; display: flex; align-items: center;
      justify-content: center; font-size: 1.1rem; flex-shrink: 0;
      overflow: hidden;
    }
    .nino-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .nino-wa {
      color: #25d366; font-size: 1.3rem; text-decoration: none;
      flex-shrink: 0; padding: 4px;
    }
    .nino-info { flex: 1; }
    .nino-info .name { font-weight: 600; font-size: 0.9rem; }
    .nino-info .detail { font-size: 0.78rem; color: #666; }
    .nino-badge {
      font-size: 0.7rem; padding: 2px 8px; border-radius: 10px;
      color: #fff; font-weight: 500;
    }
    .badge-aurora { background: var(--green); }
    .badge-prueba { background: var(--orange); }
    .empty { padding: 16px; text-align: center; color: #999; font-size: 0.85rem; }
    .total { text-align: center; padding: 20px; font-size: 1rem; color: #555; }
    .total strong { color: var(--blue); font-size: 1.3rem; }
    .loading { text-align: center; padding: 60px; color: #666; }
    @media (max-width: 480px) { .container { padding: 12px 8px; } }
  </style>
</head>
<body>
  <div class="header">
    <img src="logo.png" alt="Fenix Kids Academy">
    <h1>Reservas del Sabado</h1>
    <div class="fecha" id="fecha-label">Cargando...</div>
  </div>
  <div class="nav">
    <a href="alumnos">Alumnos</a>
    <a href="reservas">Reservas</a>
    <a href="/">Inicio</a>
  </div>
  <div class="container" id="app">
    <div class="loading">Cargando reservas...</div>
  </div>
  <script>
    const API_BASE = 'https://fenix-kids-agent-production.up.railway.app';
    const params = new URLSearchParams(location.search);
    const fecha = params.get('fecha') || '';

    async function cargar() {
      try {
        const url = fecha ? `${API_BASE}/api/reservas?fecha=${fecha}` : `${API_BASE}/api/reservas`;
        const r = await fetch(url);
        const data = await r.json();
        document.getElementById('fecha-label').textContent = data.fecha_label;
        document.title = `${data.fecha_label} | Fenix Kids Academy`;
        renderTurnos(data.turnos);
      } catch(e) {
        document.getElementById('app').innerHTML = '<div class="loading">Error cargando datos</div>';
      }
    }

    function renderTurnos(turnos) {
      const app = document.getElementById('app');
      let html = '';
      let totalNinos = 0;

      for (const turno of turnos) {
        const total = turno.aurora.length + turno.prueba.length;
        totalNinos += total;
        html += `<div class="turno">`;
        html += `<div class="turno-header"><span class="hora">${turno.hora}h</span><span class="count">${total} nino${total !== 1 ? 's' : ''}</span></div>`;
        html += `<div class="turno-body">`;

        if (turno.aurora.length > 0) {
          html += `<div class="grupo-label">Inscriptos (${turno.aurora.length})</div>`;
          for (const n of turno.aurora) {
            html += renderNino(n, 'aurora');
          }
        }
        if (turno.prueba.length > 0) {
          html += `<div class="grupo-label">Clase de prueba (${turno.prueba.length})</div>`;
          for (const n of turno.prueba) {
            html += renderNino(n, 'prueba');
          }
        }
        if (total === 0) {
          html += `<div class="empty">Sin reservas</div>`;
        }
        html += `</div></div>`;
      }

      html += `<div class="total">Total: <strong>${totalNinos}</strong> guerreros</div>`;
      app.innerHTML = html;
    }

    function renderNino(n, tipo) {
      const displayName = n.apodo || n.nombre.split(' ')[0];
      const fullName = `${n.nombre} ${n.apellido}`.trim();
      const edad = n.edad ? ` · ${n.edad} anios` : '';
      const badge = tipo === 'aurora'
        ? '<span class="nino-badge badge-aurora">Inscripto</span>'
        : '<span class="nino-badge badge-prueba">Prueba</span>';
      const link = n.slug ? `alumnos#/alumno/${n.slug}` : '#';
      const avatar = n.foto
        ? `<div class="nino-avatar"><img src="${n.foto}" alt="${displayName}"></div>`
        : `<div class="nino-avatar">${tipo === 'prueba' ? '🔥' : '🌳'}</div>`;
      const padreText = n.padre ? `<br>${n.padre}` : '';
      const waLink = n.cell
        ? `<a class="nino-wa" href="https://wa.me/${n.cell}" target="_blank" onclick="event.stopPropagation()">📱</a>`
        : '';
      return `
        <a class="nino-row" href="${link}">
          ${avatar}
          <div class="nino-info">
            <div class="name">${displayName}</div>
            <div class="detail">${fullName}${edad}${padreText}</div>
          </div>
          ${waLink}
          ${badge}
        </a>`;
    }

    cargar();
  </script>
</body>
</html>

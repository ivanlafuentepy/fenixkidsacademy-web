<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FENIX KIDS ACADEMY — Biblioteca de Videos</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0a0a0a; color: #e0e0e0; }

.header { background: #111; border-bottom: 3px solid #2E6FB5; padding: 20px 30px; position: sticky; top: 0; z-index: 100; }
.header h1 { font-size: 24px; color: #2E6FB5; display: inline; }
.header h1 span { color: #fff; font-weight: 300; }
.stats { display: flex; gap: 20px; margin-top: 10px; flex-wrap: wrap; }
.stat { background: #1a1a1a; padding: 8px 16px; border-radius: 8px; font-size: 14px; }
.stat strong { color: #2E6FB5; }

.filters { background: #111; padding: 15px 30px; border-bottom: 1px solid #222; position: sticky; top: 85px; z-index: 99; }
.filter-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 8px; }
.filter-row:last-child { margin-bottom: 0; }
.search-input { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 8px 14px; border-radius: 6px; width: 300px; font-size: 14px; }
.search-input:focus { outline: none; border-color: #2E6FB5; }
.filter-btn { background: #1a1a1a; border: 1px solid #333; color: #aaa; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: all 0.2s; }
.filter-btn:hover { border-color: #2E6FB5; color: #2E6FB5; }
.filter-btn.active { background: #2E6FB5; color: #fff; border-color: #2E6FB5; font-weight: 600; }
.filter-label { color: #666; font-size: 12px; font-weight: 600; text-transform: uppercase; min-width: 70px; }
.clear-btn { background: #333; color: #fff; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; }
.clear-btn:hover { background: #2E6FB5; color: #fff; }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; padding: 20px 30px; }
.card { background: #151515; border: 1px solid #222; border-radius: 10px; overflow: hidden; transition: border-color 0.2s; }
.card:hover { border-color: #2E6FB5; }
.card.used { opacity: 0.5; }
.card.destacado { border-color: #f59e0b; border-width: 2px; }
.thumb-container { position: relative; background: #000; aspect-ratio: 16/9; overflow: hidden; cursor: pointer; }
.thumb-container img { width: 100%; height: 100%; object-fit: cover; }
.thumb-container .no-thumb { display: flex; align-items: center; justify-content: center; height: 100%; color: #444; font-size: 14px; }
.orient-badge { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.7); color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 11px; }
.dur-badge { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.8); color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; }
.card-body { padding: 12px; }
.card-title { font-size: 11px; color: #666; margin-bottom: 6px; word-break: break-all; }
.card-id { color: #2E6FB5; font-weight: 700; font-size: 13px; }
.tags { display: flex; flex-wrap: wrap; gap: 4px; margin: 8px 0; }
.tag { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
.tag-accion { background: #1a3a1a; color: #4ade80; }
.tag-emocion { background: #3a1a1a; color: #f87171; }
.tag-plano { background: #1a1a3a; color: #818cf8; }
.tag-destacado { background: #f59e0b; color: #000; font-weight: 700; }
.meta-info { font-size: 11px; color: #555; margin: 4px 0; }

.edit-tags { margin-top: 8px; display: flex; gap: 4px; align-items: center; }
.edit-tags select { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 4px; border-radius: 4px; font-size: 11px; flex: 1; }
.edit-tags button { background: #333; color: #fff; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; }
.edit-tags button:hover { background: #2E6FB5; }
.edit-desc { width: 100%; background: #1a1a1a; border: 1px solid #222; color: #ccc; padding: 6px 8px; border-radius: 4px; font-size: 12px; margin-top: 6px; resize: vertical; min-height: 36px; font-family: inherit; }
.edit-desc:focus { outline: none; border-color: #2E6FB5; }

.status-row { display: flex; align-items: center; gap: 6px; margin-top: 8px; }
.status-badge { padding: 3px 10px; border-radius: 4px; font-size: 11px; font-weight: 600; }
.status-sin-usar { background: #1a3a1a; color: #4ade80; }
.status-usado { background: #3a1a1a; color: #f87171; }
.usado-input { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 11px; flex: 1; }
.usado-input:focus { outline: none; border-color: #2E6FB5; }
.btn-usar { background: #2E6FB5; color: #fff; border: none; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: 600; white-space: nowrap; }
.btn-usar:hover { background: #3b82f6; }

.footer { background: #111; border-top: 1px solid #222; padding: 15px 30px; text-align: center; color: #444; font-size: 12px; margin-top: 20px; }
.export-btn { background: #2E6FB5; color: #fff; border: none; padding: 8px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; margin: 0 10px; }
.export-btn:hover { background: #3b82f6; }

.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 200; justify-content: center; align-items: center; flex-direction: column; }
.modal.open { display: flex; }
.modal img { max-width: 90%; max-height: 80%; border-radius: 8px; }
.modal-info { color: #aaa; font-size: 14px; margin-top: 15px; text-align: center; }
.modal-info strong { color: #2E6FB5; }
.modal-close { position: absolute; top: 20px; right: 30px; color: #fff; font-size: 30px; cursor: pointer; }
.modal-nav { position: absolute; top: 50%; color: #fff; font-size: 40px; cursor: pointer; user-select: none; padding: 20px; }
.modal-prev { left: 10px; }
.modal-next { right: 10px; }
</style>
</head>
<body>

<div class="header">
  <h1>FENIX KIDS ACADEMY <span>— Biblioteca de Videos</span></h1>
  <div class="stats">
    <div class="stat"><strong id="totalCount">0</strong> videos</div>
    <div class="stat"><strong id="sinUsarCount">0</strong> sin usar</div>
    <div class="stat"><strong id="usadoCount">0</strong> usados</div>
    <div class="stat"><strong id="destacadoCount">0</strong> destacados</div>
    <div class="stat"><strong id="durTotal">0</strong> min totales</div>
    <div class="stat" id="videoCount"></div>
  </div>
</div>

<div class="filters">
  <div class="filter-row">
    <input class="search-input" id="searchInput" placeholder="Buscar por archivo, descripcion, tags..." />
    <button class="clear-btn" onclick="clearFilters()">Limpiar filtros</button>
    <span style="color:#444; font-size:12px; margin-left:auto;" id="filterCount"></span>
  </div>
  <div class="filter-row">
    <span class="filter-label">Accion:</span>
    <button class="filter-btn" data-filter="accion" data-value="trepa">trepa</button>
    <button class="filter-btn" data-filter="accion" data-value="corre">corre</button>
    <button class="filter-btn" data-filter="accion" data-value="salta">salta</button>
    <button class="filter-btn" data-filter="accion" data-value="obstaculo">obstaculo</button>
    <button class="filter-btn" data-filter="accion" data-value="cuerda">cuerda</button>
    <button class="filter-btn" data-filter="accion" data-value="equilibrio">equilibrio</button>
    <button class="filter-btn" data-filter="accion" data-value="sprint">sprint</button>
    <button class="filter-btn" data-filter="accion" data-value="carga peso">carga peso</button>
    <button class="filter-btn" data-filter="accion" data-value="juego en grupo">grupo</button>
    <button class="filter-btn" data-filter="accion" data-value="naturaleza">naturaleza</button>
    <button class="filter-btn" data-filter="accion" data-value="piscina">piscina</button>
    <button class="filter-btn" data-filter="accion" data-value="gimnasio">gimnasio</button>
    <button class="filter-btn" data-filter="accion" data-value="parque">parque</button>
  </div>
  <div class="filter-row">
    <span class="filter-label">Emocion:</span>
    <button class="filter-btn" data-filter="emocion" data-value="esfuerzo">esfuerzo</button>
    <button class="filter-btn" data-filter="emocion" data-value="logro">logro</button>
    <button class="filter-btn" data-filter="emocion" data-value="risa">risa</button>
    <button class="filter-btn" data-filter="emocion" data-value="concentracion">concentracion</button>
    <button class="filter-btn" data-filter="emocion" data-value="miedo">miedo</button>
    <button class="filter-btn" data-filter="emocion" data-value="festejo">festejo</button>
    <button class="filter-btn" data-filter="emocion" data-value="determinacion">determinacion</button>
  </div>
  <div class="filter-row">
    <span class="filter-label">Plano:</span>
    <button class="filter-btn" data-filter="plano" data-value="primer plano">primer plano</button>
    <button class="filter-btn" data-filter="plano" data-value="plano medio">plano medio</button>
    <button class="filter-btn" data-filter="plano" data-value="plano general">plano general</button>
    <button class="filter-btn" data-filter="plano" data-value="panoramica">panoramica</button>
    <button class="filter-btn" data-filter="plano" data-value="detalle">detalle</button>
  </div>
  <div class="filter-row">
    <span class="filter-label">Orientacion:</span>
    <button class="filter-btn" data-filter="orient" data-value="vertical">vertical</button>
    <button class="filter-btn" data-filter="orient" data-value="horizontal">horizontal</button>
    <span class="filter-label" style="margin-left:15px;">Estado:</span>
    <button class="filter-btn" data-filter="estado" data-value="sin usar">sin usar</button>
    <button class="filter-btn" data-filter="estado" data-value="usado">usado</button>
    <span class="filter-label" style="margin-left:15px;">Calidad:</span>
    <button class="filter-btn" data-filter="calidad" data-value="destacado">destacado</button>
  </div>
</div>

<div class="grid" id="videoGrid"></div>

<div class="footer">
  <button class="export-btn" onclick="exportCatalog()">Exportar catalogo (JSON)</button>
  <button class="export-btn" style="background:#333;" onclick="exportSeleccion()">Exportar seleccion</button>
  <p style="margin-top:10px;color:#555;">FENIX KIDS ACADEMY — Catalogo de videos sab 16 mayo 2026</p>
</div>

<div class="modal" id="frameModal">
  <span class="modal-close" onclick="closeModal()">&times;</span>
  <span class="modal-nav modal-prev" onclick="navModal(-1)">&#10094;</span>
  <img id="modalImg" src="" />
  <div class="modal-info" id="modalInfo"></div>
  <span class="modal-nav modal-next" onclick="navModal(1)">&#10095;</span>
</div>

<script>
let catalog = null;
let activeFilters = {};
let userState = JSON.parse(localStorage.getItem('fenix_catalog_state') || '{}');
let modalVideos = [];
let modalIdx = 0;

fetch('catalogo.json')
  .then(r => r.json())
  .then(data => {
    catalog = data;
    catalog.videos.forEach(v => {
      if (userState[v.id]) Object.assign(v, userState[v.id]);
    });
    render();
    updateStats();
  });

function render() {
  const grid = document.getElementById('videoGrid');
  const filtered = getFiltered();
  document.getElementById('filterCount').textContent = `Mostrando ${filtered.length} de ${catalog.videos.length}`;

  grid.innerHTML = filtered.map(v => {
    const base = v.archivo.replace(/\.[^.]+$/, '');
    const thumbSrc = `thumbnails/${base}.jpg`;
    const isUsed = v.estado === 'usado';
    const hasDest = v.tags_generales.includes('destacado');

    return `
    <div class="card ${isUsed ? 'used' : ''} ${hasDest ? 'destacado' : ''}" data-id="${v.id}">
      <div class="thumb-container" onclick="openViewer('${v.id}')">
        <img src="${thumbSrc}" onerror="this.parentElement.innerHTML='<div class=no-thumb>Sin thumbnail</div>'" loading="lazy" />
        <span class="orient-badge">${v.orientacion === 'vertical' ? '9:16' : '16:9'}</span>
        <span class="dur-badge">${formatDur(v.duracion_seg)}</span>
      </div>
      <div class="card-body">
        <div class="card-title"><span class="card-id">#${v.id}</span> ${v.archivo}</div>
        <div class="tags">
          ${v.tags_generales.map(t => `<span class="tag ${t === 'destacado' ? 'tag-destacado' : 'tag-accion'}">${t}</span>`).join('')}
        </div>
        <div class="meta-info">${v.resolucion} | ${v.fps} fps | ${v.codec} | ${v.segmentos.length} seg</div>
        <div class="edit-tags">
          <select id="ts_${v.id}">
            <option value="">+ tag...</option>
            <optgroup label="Accion">
              <option>trepa</option><option>corre</option><option>salta</option>
              <option>obstaculo</option><option>cuerda</option><option>equilibrio</option>
              <option>sprint</option><option>carga peso</option><option>juego en grupo</option>
              <option>naturaleza</option><option>piscina</option><option>gimnasio</option>
              <option>parque</option><option>La Casona</option>
            </optgroup>
            <optgroup label="Emocion">
              <option>esfuerzo</option><option>logro</option><option>risa</option>
              <option>concentracion</option><option>miedo</option><option>festejo</option>
              <option>determinacion</option>
            </optgroup>
            <optgroup label="Plano">
              <option>primer plano</option><option>plano medio</option>
              <option>plano general</option><option>panoramica</option><option>detalle</option>
            </optgroup>
            <optgroup label="Calidad">
              <option>destacado</option>
            </optgroup>
          </select>
          <button onclick="addTag('${v.id}')">+</button>
          <button onclick="removeTags('${v.id}')" style="background:#600;">x</button>
        </div>
        <textarea class="edit-desc" placeholder="Descripcion..."
          onchange="saveDesc('${v.id}', this.value)">${v.notas || ''}</textarea>
        <div class="status-row">
          <span class="status-badge ${isUsed ? 'status-usado' : 'status-sin-usar'}">${v.estado}</span>
          <input class="usado-input" placeholder="Usado en..." value="${(v.usado_en||[]).join(', ')}"
            onchange="saveUsadoEn('${v.id}', this.value)" />
          <button class="btn-usar" onclick="toggleUsado('${v.id}')">${isUsed ? 'Desmarcar' : 'Usado'}</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function getFiltered() {
  let vids = catalog.videos;
  const q = document.getElementById('searchInput').value.toLowerCase();
  if (q) {
    vids = vids.filter(v =>
      v.archivo.toLowerCase().includes(q) ||
      (v.notas||'').toLowerCase().includes(q) ||
      v.tags_generales.some(t => t.toLowerCase().includes(q))
    );
  }
  Object.entries(activeFilters).forEach(([k, vals]) => {
    if (!vals.length) return;
    vids = vids.filter(v => {
      if (k === 'orient') return vals.includes(v.orientacion);
      if (k === 'estado') return vals.includes(v.estado);
      if (k === 'calidad') return vals.some(x => v.tags_generales.includes(x));
      if (k === 'accion') return vals.some(x => v.tags_generales.includes(x) || v.segmentos.some(s => s.acciones && s.acciones.includes(x)));
      if (k === 'emocion') return vals.some(x => v.tags_generales.includes(x) || v.segmentos.some(s => s.emocion === x));
      if (k === 'plano') return vals.some(x => v.segmentos.some(s => s.plano === x));
      return true;
    });
  });
  return vids;
}

function formatDur(s) {
  if (s < 60) return s.toFixed(1) + 's';
  return Math.floor(s/60) + ':' + String(Math.floor(s%60)).padStart(2,'0');
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const f = btn.dataset.filter, val = btn.dataset.value;
    if (!activeFilters[f]) activeFilters[f] = [];
    if (btn.classList.contains('active')) {
      btn.classList.remove('active');
      activeFilters[f] = activeFilters[f].filter(v => v !== val);
    } else {
      btn.classList.add('active');
      activeFilters[f].push(val);
    }
    render();
  });
});

document.getElementById('searchInput').addEventListener('input', () => render());

function clearFilters() {
  activeFilters = {};
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  render();
}

function addTag(id) {
  const sel = document.getElementById('ts_' + id);
  if (!sel.value) return;
  const v = catalog.videos.find(x => x.id === id);
  if (!v.tags_generales.includes(sel.value)) {
    v.tags_generales.push(sel.value);
    saveState(v); render();
  }
  sel.value = '';
}

function removeTags(id) {
  const v = catalog.videos.find(x => x.id === id);
  v.tags_generales = [];
  saveState(v); render();
}

function saveDesc(id, desc) {
  const v = catalog.videos.find(x => x.id === id);
  v.notas = desc; saveState(v);
}

function saveUsadoEn(id, val) {
  const v = catalog.videos.find(x => x.id === id);
  v.usado_en = val.split(',').map(s => s.trim()).filter(Boolean);
  saveState(v);
}

function toggleUsado(id) {
  const v = catalog.videos.find(x => x.id === id);
  v.estado = v.estado === 'usado' ? 'sin usar' : 'usado';
  saveState(v); render(); updateStats();
}

function saveState(v) {
  userState[v.id] = { estado: v.estado, usado_en: v.usado_en, tags_generales: v.tags_generales, notas: v.notas };
  localStorage.setItem('fenix_catalog_state', JSON.stringify(userState));
}

function updateStats() {
  const t = catalog.videos.length;
  const su = catalog.videos.filter(v => v.estado !== 'usado').length;
  document.getElementById('totalCount').textContent = t;
  document.getElementById('sinUsarCount').textContent = su;
  document.getElementById('usadoCount').textContent = t - su;
  document.getElementById('destacadoCount').textContent = catalog.videos.filter(v => v.tags_generales.includes('destacado')).length;
  document.getElementById('durTotal').textContent = (catalog.videos.reduce((a, v) => a + v.duracion_seg, 0) / 60).toFixed(1);
}

// Modal — navigate between videos
function openViewer(id) {
  modalVideos = getFiltered();
  modalIdx = modalVideos.findIndex(v => v.id === id);
  if (modalIdx < 0) modalIdx = 0;
  showModal();
  document.getElementById('frameModal').classList.add('open');
}

function showModal() {
  const v = modalVideos[modalIdx];
  const base = v.archivo.replace(/\.[^.]+$/, '');
  document.getElementById('modalImg').src = `thumbnails/${base}.jpg`;
  document.getElementById('modalInfo').innerHTML =
    `<strong>#${v.id}</strong> ${v.archivo}<br>${v.orientacion} | ${formatDur(v.duracion_seg)} | ${v.resolucion}<br><span style="color:#666">${modalIdx + 1} / ${modalVideos.length}</span>`;
}

function navModal(dir) {
  modalIdx = (modalIdx + dir + modalVideos.length) % modalVideos.length;
  showModal();
}

function closeModal() {
  document.getElementById('frameModal').classList.remove('open');
}

document.addEventListener('keydown', e => {
  if (!document.getElementById('frameModal').classList.contains('open')) return;
  if (e.key === 'Escape') closeModal();
  if (e.key === 'ArrowLeft') navModal(-1);
  if (e.key === 'ArrowRight') navModal(1);
});

function exportCatalog() {
  catalog.videos.forEach(v => { if (userState[v.id]) Object.assign(v, userState[v.id]); });
  catalog.exportado = new Date().toISOString();
  const b = new Blob([JSON.stringify(catalog, null, 2)], {type: 'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(b);
  a.download = 'fenix_catalogo_' + new Date().toISOString().slice(0,10) + '.json'; a.click();
}

function exportSeleccion() {
  const f = getFiltered();
  const b = new Blob([JSON.stringify({exportado: new Date().toISOString(), total: f.length, videos: f}, null, 2)], {type: 'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(b);
  a.download = 'fenix_seleccion_' + new Date().toISOString().slice(0,10) + '.json'; a.click();
}
</script>
</body>
</html>
